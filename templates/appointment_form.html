{% extends 'base.html' %}
{% block content %}
<h2>Novo Agendamento</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Agendar</button>
</form>
{% if form.errors %}
    <div class="alert alert-danger">{{ form.errors }}</div>
{% endif %}
{% endblock %}
